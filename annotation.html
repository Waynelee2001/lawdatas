        // 辅助函数：节内数字转换
        function sectionToChinese(section) {
            var chnNumChar = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
            var chnUnitChar = ["", "十", "百", "千"];
            var strIns = '', chnStr = '';
            var unitPos = 0;
            var zero = true;
            while (section > 0) {
                var v = section % 10;
                if (v === 0) {
                    if (!zero) {
                        zero = true;
                        chnStr = chnNumChar[v] + chnStr;
                    }
                } else {
                    zero = false;
                    strIns = chnNumChar[v];
                    strIns += chnUnitChar[unitPos];
                    chnStr = strIns + chnStr;
                }
                unitPos++;
                section = Math.floor(section / 10);
            }
            return chnStr;
        }

        // 辅助函数：阿拉伯数字转中文数字
        function numberToChinese(num) {
            var chnNumChar = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
            var chnUnitSection = ["", "万", "亿", "万亿"];
            var unitPos = 0;
            var strIns = '', chnStr = '';
            var needZero = false;

            if (num === 0) return chnNumChar[0];

            while (num > 0) {
                var section = num % 10000;
                if (needZero) {
                    chnStr = chnNumChar[0] + chnStr;
                }
                strIns = sectionToChinese(section);
                strIns += (section !== 0) ? chnUnitSection[unitPos] : chnUnitSection[0];
                chnStr = strIns + chnStr;
                needZero = (section < 1000) && (section > 0);
                num = Math.floor(num / 10000);
                unitPos++;
            }

            // 法条习惯修正：10-19 -> 十X (而不是 一十X)
            if (chnStr.indexOf('一十') === 0) {
                chnStr = chnStr.substring(1);
            }

            return chnStr;
        }

        // 转换输入文本中的数字
        function convertInputToChinese(text) {
            return text.replace(/\d+/g, function (match) {
                return numberToChinese(parseInt(match));
            });
        }

        // 辅助函数：中文数字转阿拉伯数字 (用于反向匹配)
        function chineseToNumber(chnStr) {
            var chnNumChar = { '零': 0, '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9 };
            var chnNameValue = { '十': { value: 10, secUnit: false }, '百': { value: 100, secUnit: false }, '千': { value: 1000, secUnit: false }, '万': { value: 10000, secUnit: true }, '亿': { value: 100000000, secUnit: true } };
            var rtn = 0;
            var section = 0;
            var number = 0;
            var secUnit = false;
            var str = chnStr.split('');

            for (var i = 0; i < str.length; i++) {
                var num = chnNumChar[str[i]];
                if (typeof num !== 'undefined') {
                    number = num;
                    if (i === str.length - 1) {
                        section += number;
                    }
                } else {
                    var unit = chnNameValue[str[i]];
                    if (!unit) continue;
                    secUnit = unit.secUnit;
                    if (secUnit) {
                        section = (section + number) * unit.value;
                        rtn += section;
                        section = 0;
                    } else {
                        if (unit.value === 10 && number === 0 && i === 0) {
                            number = 1;
                        }
                        section += (number * unit.value);
                    }
                    number = 0;
                }
            }
            return rtn + section;
        }

        function searchToc(e) {

                tocSearchMatches = [];

                var targetNum = isDigitSearch ? parseInt(keyword, 10) : null;

                tocItems.each(function () {

                    var text = $item.text(); // 这可能包含隐藏文本
                    var textLower = text.toLowerCase();
                    var matched = false;
                    var highlightTokens = [];

                    if (isDigitSearch) {
                        // 策略：如果是纯数字搜索，首先判断这一行是不是"编、章、节"
                        // 如果是，直接跳过
                        var isSectionNode = /^\s*第[零一二三四五六七八九十百千万\d]+[编章节]/.test(text);
                        if (isSectionNode) {
                            return;
                        }

                        // 只有通过了上面检查的，才进行"第...条"的匹配
                        var regex = /第([零一二三四五六七八九十百千万\d]+)条/g;
                        var match;
                        while ((match = regex.exec(text)) !== null) {
                            var digitStr = match[1];
                            var num;
                            if (/\d/.test(digitStr)) {
                                num = parseInt(digitStr, 10);
                            } else {
                                num = chineseToNumber(digitStr);
                            }

                            if (num === targetNum) {
                                matched = true;
                                highlightTokens.push(match[0]);
                            }
                        }
                    } else {
                        // 普通搜索
                        var keys = [keywordLower];
                        var cnKey = convertInputToChinese(keyword);
                        if (cnKey !== keyword) keys.push(cnKey);

                        var matchedKey = keys.find(function (k) { return textLower.indexOf(k) !== -1; });
                        if (matchedKey) {
                            matched = true;

                    }

                    if (matched) {
                        $item.parents('.toc-children').addClass('expanded');
                        $item.parents('.toc-node').find('> .toc-item > .toggle').addClass('expanded');

                        if (highlightTokens.length > 0) {
                            var uniqueTokens = highlightTokens.filter(function (item, pos) {
                                return highlightTokens.indexOf(item) == pos;
                            }).sort(function (a, b) { return b.length - a.length; });

                            var pattern = uniqueTokens.map(function (k) { return k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }).join('|');
                            var highlightHtml = text.replace(new RegExp('(' + pattern + ')', 'gi'), '<span class="search-highlight">$1</span>');

                            var hasToggle = $item.find('.toggle').length > 0;
                            $item.html(highlightHtml);
                            if (hasToggle) {
                                $item.prepend('<span class="toggle expanded"></span>');
                            }
                        }

                        tocSearchMatches.push($item);
                    }
                });

                if (tocSearchMatches.length > 0) {
                    tocFindNext();
                }

            }, 300);
        }

                regex = /第([零一二三四五六七八九十百千万\d]+)条/g;
            } else {
                var keywords = [keyword];
                var cnKeyword = convertInputToChinese(keyword);
                if (cnKeyword !== keyword) keywords.push(cnKeyword);
                var pattern = keywords.map(function (k) {
                    return k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                }).join('|');
                regex = new RegExp(pattern, 'gi');
            }

            function highlightText(node) {
                if (node.nodeType === 3) {
                    var val = node.data;
                    var matches = [];
                    var match;
                    regex.lastIndex = 0;

                    while ((match = regex.exec(val)) !== null) {
                        if (isDigitSearch) {
                            var digitStr = match[1];
                            var num = /\d/.test(digitStr) ? parseInt(digitStr, 10) : chineseToNumber(digitStr);
                            if (num === targetNum) {
                                matches.push({ index: match.index, length: match[0].length, text: match[0] });
                            }
                        } else {
                            matches.push({ index: match.index, length: match[0].length, text: match[0] });
                        }
                    }

                    if (matches.length > 0) {
                        // 包含新创建的 span 的临时列表，用于按顺序加入 contentSearchMatches
                        var newSpans = [];

                        // 倒序处理分割，保持索引有效
                        for (var i = matches.length - 1; i >= 0; i--) {
                            var m = matches[i];
                            var matchNode = node.splitText(m.index); // Split logic: node is left part (or truncated), matchNode is right part
                            matchNode.splitText(m.length); // Split matchNode: left is match, right is remainder

                            var span = document.createElement('span');
                            span.className = 'search-highlight';
                            span.textContent = m.text;
                            matchNode.parentNode.replaceChild(span, matchNode);
                            newSpans.unshift(span); // 保持正序
                        }

                        // 将新生成的 spans 加入全局列表
                        for (var i = 0; i < newSpans.length; i++) {
                            contentSearchMatches.push(newSpans[i]);
                        }

                        return matches.length;
                    }
                } else if (node.nodeType === 1 && node.childNodes && !/(script|style)/i.test(node.tagName) && !node.classList.contains('search-highlight')) {
                    for (var i = 0; i < node.childNodes.length; i++) {
                        var ret = highlightText(node.childNodes[i]);
                        // 如果有分割发生，跳过新增的节点
                        // 每次匹配产生 2 个新 sibling (span 和 remainder text)
                        // 所以 index 需要增加 2 * ret
                        if (ret > 0) {
                            i += ret * 2; // 实际上 splitText 会增加节点，highlightText 处理了整个 textNode
                            // 所以这里我们只需要跳过那一堆新产生的节点。
                            // 修正：highlightText 处理了 node.childNodes[i]。它把自己切分成了 (text, span, text...)。
                            // 原先的 childNodes[i] 还是 childNodes[i] (左边)。
                            // 后面紧跟的是 span 和 text ...
                            // 不需要再次处理它们。
                            // 注意：ret 是匹配数。每有一个匹配，就多出 2 个节点 (span + text segment)。
                            // 比如 1 个匹配： T -> T S T. 3 nodes. Increase is 2.
                            // i += 2 * ret ?
                            // 假设 matches=1. i+=2. Next loop i++. Total skip 2. Visits i+3 (which is next original node). Correct.
                            // 假设 matches=2. T -> T S T S T. 5 nodes. Increase is 4.
                            // i += 4. Next loop i++. Total skip 4. Correct.
                        }
                    }
                }
                return 0;
            }

            highlightText(contentDiv[0]);

            // 按文档顺序排序 contentSearchMatches? 
            // 我们的递归遍历是按文档顺序的，highlightText 只要保证内部 push 也是顺序的即可。
            // 我们用了 unshift to newSpans then push, so order is preserved.

            if (contentSearchMatches.length > 0) {
                findNext();
            }
        }

        function findNext() {

        // 搜索左侧树功能 (修复版 + 防抖 + 暴力清除)
        function searchTree() {
            var keyword = $("#searchInput").val().trim();

            if (searchTimer) clearTimeout(searchTimer);

            searchTimer = setTimeout(function () {
                if (!treeObj) return;

                // 1. 清除数据状态
                var allNodes = treeObj.transformToArray(treeObj.getNodes());
                for (var i = 0; i < allNodes.length; i++) {
                    if (allNodes[i].highlight) {
                        allNodes[i].highlight = false;
                        treeObj.updateNode(allNodes[i]);
                    }
                }

                searchNodes = [];
                searchIndex = 0;

                if (!keyword) {
                    // 2. 取消选中
                    treeObj.cancelSelectedNode();

                    // 3. 暴力清除 DOM 样式遗留
                    $('#treeDemo a').css({
                        'color': '',
                        'font-weight': ''
                    });

                    return;
                }

                // 执行搜索
                searchNodes = treeObj.getNodesByParamFuzzy("content", keyword);

                for (var i = 0; i < searchNodes.length; i++) {
                    searchNodes[i].highlight = true;
                    treeObj.updateNode(searchNodes[i]);

                    // 展开父节点
                    var parent = searchNodes[i].getParentNode();
                    while (parent) {
                        treeObj.expandNode(parent, true, false, false);
                        parent = parent.getParentNode();
                    }
                }
            }, 300);
        }

        // 拖拽调整宽度
        var isResizing = false;
        var resizeTarget = null;

        function startResize(e, target) {
            isResizing = true;
            resizeTarget = target;
            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);
            e.preventDefault();
        }

        function doResize(e) {
            if (!isResizing) return;

            if (resizeTarget === 'left') {
                var newWidth = e.clientX;
                if (newWidth >= 200 && newWidth <= window.innerWidth * 0.4) {
                    $("#leftDiv").css("width", newWidth + "px");
                }
            } else if (resizeTarget === 'middle') {
                var leftWidth = $("#leftDiv").width();
                var newWidth = e.clientX - leftWidth;
                if (newWidth >= 200 && newWidth <= window.innerWidth * 0.4) {
                    $("#middleDiv").css("width", newWidth + "px");
                }
            }
        }

        function stopResize() {
            isResizing = false;
            resizeTarget = null;
            document.removeEventListener('mousemove', doResize);
            document.removeEventListener('mouseup', stopResize);
        }

        // 转换树数据
        function convertTreeData(data) {
            if (!data) return [];
            var result = [];

            for (var i = 0; i < data.length; i++) {
                var item = data[i];

                // 过滤掉条款节点（以“第X条”开头）
                if (/^第[一二三四五六七八九十百千万零○〇]+条/.test(item.content)) {
                    continue;
                }

                var node = {
                    id: item.id,
                    content: item.content,
                    type: item.type,
                    jsonUrl: item.jsonUrl,
                    open: false,
                    isParent: item.children && item.children.length > 0
                };

                if (item.children && item.children.length > 0) {
                    node.children = convertTreeData(item.children);
                }

                result.push(node);
            }

            return result;
        }

        // 键盘导航功能
        var activePanel = null; // 'left', 'middle', 'content'

        function initKeyboardNavigation() {
            // 跟踪当前激活的面板
            $('#treeView').on('click', function () {
                activePanel = 'left';
            });

            $('#tocView').on('click', function () {
                activePanel = 'middle';
            });

            $('#tabs').on('click', function () {
                activePanel = 'content';
            });

            // 监听键盘事件
            $(document).on('keydown', function (e) {
                // 如果正在输入框中，不处理
                if ($(e.target).is('input, textarea')) return;

                // 处理上下方向键
                if (e.keyCode === 38 || e.keyCode === 40) {
                    var direction = e.keyCode === 38 ? 'up' : 'down';

                    switch (activePanel) {
                        case 'left':
                            navigateLeftTree(direction);
                            break;
                        case 'middle':
                            navigateToc(direction);
                            break;
                        case 'content':
                            navigateContent(direction);
                            break;
                    }

                    e.preventDefault();
                }

                // 处理回车键 - 模拟点击/展开/收缩
                if (e.keyCode === 13) {
                    switch (activePanel) {
                        case 'left':
                            enterLeftTree();
                            break;
                        case 'middle':
                            enterToc();
                            break;
                        case 'content':
                            // 正文区回车无特殊操作，点击效果已经由上下键触发
                            break;
                    }

                    e.preventDefault();
                }
            });
        }

        // 左侧导航树键盘导航
        function navigateLeftTree(direction) {
            if (!treeObj) return;

            var selectedNodes = treeObj.getSelectedNodes();
            if (selectedNodes.length === 0) return;

            var currentNode = selectedNodes[0];
            var allVisibleNodes = getVisibleNodes(treeObj.getNodes());
            var currentIndex = -1;

            for (var i = 0; i < allVisibleNodes.length; i++) {
                if (allVisibleNodes[i].tId === currentNode.tId) {
                    currentIndex = i;
                    break;
                }
            }

            if (currentIndex === -1) return;

            var newIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
            if (newIndex >= 0 && newIndex < allVisibleNodes.length) {
                var newNode = allVisibleNodes[newIndex];
                treeObj.selectNode(newNode);

                // 滚动到可见位置
                var nodeEl = $('#' + newNode.tId + '_a');
                if (nodeEl.length > 0) {
                    var treeView = $('#treeView');
                    if (!isElementInViewport(nodeEl, treeView)) {
                        var nodeOffset = nodeEl.offset().top - treeView.offset().top + treeView.scrollTop();
                        treeView.animate({ scrollTop: nodeOffset - 100 }, 150);
                    }
                }
            }
        }

        // 左侧导航树回车键处理：展开/收缩或加载内容
        function enterLeftTree() {
            if (!treeObj) return;

            var selectedNodes = treeObj.getSelectedNodes();
            if (selectedNodes.length === 0) return;

            var currentNode = selectedNodes[0];

            // 如果有子节点，展开/收缩
            if (currentNode.children && currentNode.children.length > 0) {
                treeObj.expandNode(currentNode, !currentNode.open, false, true);
            } else {
                // 如果是叶子节点，加载内容
                loadNodeContent(currentNode);
            }
        }

        // 获取所有可见节点
        function getVisibleNodes(nodes, result) {
            result = result || [];
            for (var i = 0; i < nodes.length; i++) {
                var node = nodes[i];
                result.push(node);
                if (node.open && node.children && node.children.length > 0) {
                    getVisibleNodes(node.children, result);
                }
            }
            return result;
        }

        // ========== 法条交叉引用链接功能 ==========

        // 法条引用正则：匹配 "《法律名》第X条" 或 "法律名第X条" 格式
        // 款项后缀正则片段（可选匹配 第X款、第X项）
        var PARAGRAPH_SUFFIX = ''; // 不再把“第X款、第X项”纳入蓝链标签中

        var LAW_REF_PATTERN = new RegExp('(《[^》]+》|民法典|刑法|公司法|合伙企业法|民事诉讼法|刑事诉讼法|行政诉讼法|行政处罚法|行政许可法|行政强制法|行政复议法|国家赔偿法|公务员法|治安管理处罚法|票据法|证券法|保险法|海商法|信托法|企业破产法|劳动法|劳动合同法|消费者权益保护法|反不正当竞争法|反垄断法|产品质量法|商标法|专利法|著作权法|仲裁法|公证法|律师法|法律援助法|人民陪审员法|监察法|社区矫正法|立法法|宪法)(第[一二三四五六七八九十百千零〇○]+条(?:之[一二三四五六七八九十]+)?' + PARAGRAPH_SUFFIX + ')', 'g');

        // 本法引用正则
        var SELF_REF_PATTERN = new RegExp('(本法|本规定|本条例|本解释|本办法|本意见|本决定)(第[一二三四五六七八九十百千零〇○]+条(?:之[一二三四五六七八九十]+)?' + PARAGRAPH_SUFFIX + ')', 'g');

        // 后续条号正则
        var FOLLOW_ARTICLE_PATTERN = new RegExp('([、，,])(第[一二三四五六七八九十百千零〇○]+条(?:之[一二三四五六七八九十]+)?' + PARAGRAPH_SUFFIX + ')', 'g');

        // 处理法条引用，将匹配的文本转为可点击链接
        function processLawReferences(html) {
            if (typeof lawNameToId === 'undefined') return html;

            // 第一步：处理跨法律引用（"民法典第X条"格式）
            // 同时记录匹配位置以便处理后续连续条号
            var refPositions = []; // {endIndex, lawId, lawName}

            html = html.replace(LAW_REF_PATTERN, function (match, lawPart, articlePart, offset) {
                var lawName = lawPart.replace(/[《》]/g, '');
                var lawId = lawNameToId[lawName];

                if (lawId) {
                    var articleOnly = articlePart.match(/第[一二三四五六七八九十百千零〇○]+条(?:之[一二三四五六七八九十]+)?/)[0];

                    refPositions.push({
                        endIndex: offset + match.length,
                        lawId: lawId,
                        lawName: lawName
                    });
                    return '<span class="law-ref" data-law-id="' + lawId +
                        '" data-law-name="' + lawName +
                        '" data-article="' + articleOnly +
                        '" data-full="' + lawName + ' ' + articleOnly + '">' + match + '</span>';
                }
                return match;
            });

            // 转移到了末尾（Step 3 之后）统一个后处理

            // 第二步：处理本法/本规定引用
            if (currentLawId) {
                var currentLawTitle = $('#contentTitle').text().replace(/（大纲没有）/g, '').replace(/\(大纲没有\)/g, '').trim();
                html = html.replace(SELF_REF_PATTERN, function (match, selfWord, articlePart) {
                    var articleOnly = articlePart.match(/第[一二三四五六七八九十百千零〇○]+条(?:之[一二三四五六七八九十]+)?/)[0];
                    return '<span class="law-ref law-ref-self" data-law-id="' + currentLawId +
                        '" data-law-name="' + currentLawTitle +
                        '" data-article="' + articleOnly +
                        '" data-full="' + currentLawTitle + ' ' + articleOnly + '">' + match + '</span>';
                });
            }

            // 第三步：处理连续条号引用（"第X条……、第Y条"）
            // 循环扫描 </span> 后紧跟的短文本+分隔符+新条号格式
            // 限制中间本不能包含新的法名《》或跨越句子句号，也不能跨越括号（防止被（《公司法2023版》）隔断的新条号被牵连）
            var changed = true;
            while (changed) {
                changed = false;
                html = html.replace(
                    new RegExp('(<span class="law-ref[^"]*"[^>]*data-law-id="([^"]+)"[^>]*data-law-name="([^"]+)"[^>]*>[^<]*<\\/span>)([^<《》。）（()]{0,30}?)([、，,]|或者|或|和|及|以及|至)(第[一二三四五六七八九十百千零〇○]+条(?:之[一二三四五六七八九十]+)?' + PARAGRAPH_SUFFIX + ')', 'g'),
                    function (match, prevSpan, lawId, lawName, between, separator, articlePart) {
                        changed = true;
                        var articleOnly = articlePart.match(/第[一二三四五六七八九十百千零〇○]+条(?:之[一二三四五六七八九十]+)?/)[0];
                        return prevSpan + between + separator +
                            '<span class="law-ref" data-law-id="' + lawId +
                            '" data-law-name="' + lawName +

            // 对《仲裁法2025版》的新修条文作类似处理，因包含“第13条、第14条”的情况，取顿号前第一条作跳转

            // 对《行政诉讼法2017版》的新修条文作类似处理
            var xzId = (typeof lawNameToId !== 'undefined') && lawNameToId['中华人民共和国行政诉讼法'];
            if (xzId) {
                html = html.replace(

                    function (m, originalText, newArt) {

                html = html.replace(
                    new RegExp('(第[一二三四五六七八九十百千零〇○]+条)（《行政诉讼法2017版》(第[一二三四五六七八九十百千零〇○]+条)）', 'g'),
                    function (m, oldArt, newArt) {
                        return oldArt + '（<span class="law-ref" data-law-id="' + xzId + '" data-law-name="中华人民共和国行政诉讼法" data-article="' + newArt + '" data-full="中华人民共和国行政诉讼法 ' + newArt + '">《行政诉讼法2017版》' + newArt + '</span>）';
                    }
                );
                html = html.replace(
                    /（《行政诉讼法2017版》(第[一二三四五六七八九十百千零〇○]+条)）/g,
                    function (m, newArt) {
                        return '（<span class="law-ref" data-law-id="' + xzId + '" data-law-name="中华人民共和国行政诉讼法" data-article="' + newArt + '" data-full="中华人民共和国行政诉讼法 ' + newArt + '">《行政诉讼法2017版》' + newArt + '</span>）';
                    }

            }

            // 通用校正：将「（现改为第Y条）」「（现为第Y条）」紧跟在 span 后的情况，把 span 的 data-article/data-full 更新为 Y 条
            // 通用校正：将「（现改为第Y条）」「（现为第Y条）」跟在 span 后的情况，把带有新属性的 span 包裹在新条号文字上
            // 允许 span 结束标签 </span> 和全角括号 （ 之间有最多 15 个字符的间隔（如"第一款"、"第一款（一）项"等）
            html = html.replace(
                /(<span class="law-ref"[^>]*>)([^<]+)(<\/span>)([^（]{0,15})(（现(?:改)?为(?:第[一二三四五六七八九十百千零〇○0-9]+(?:、第[^）]+)?条)+[^）]*）)/g,

            var oldHtml;
            do {
                oldHtml = html;
                html = html.replace(consecutiveCorrRegex, function (m, prevSpan, lawId, lawName, sep, oldArt, prefix, newArtNumText) {
                    var newArtMatch = newArtNumText.match(/第([一二三四五六七八九十百千零〇○0-9]+)条/);
                    if (!newArtMatch) return m;
                    var newArt = '第' + newArtMatch[1] + '条';
                    var newSpan = '<span class="law-ref" data-law-id="' + lawId + '" data-law-name="' + lawName + '" data-article="' + newArt + '" data-full="' + lawName + ' ' + newArt + '">' + prefix + newArtNumText + '</span>';

        }

        // 预览弹窗相关变量
        var previewTimeout = null;
        var hideTimeout = null; // 隐藏延时
        var currentPreview = null;
        var refContentCache = {}; // 缓存已获取的法条内容

        // 初始化法条引用事件
        function initLawRefEvents() {
            // 悬停显示预览
            $(document).on('mouseenter', '.law-ref', function (e) {
                var $ref = $(this);
                clearTimeout(previewTimeout);
                clearTimeout(hideTimeout); // 清除隐藏延时

                previewTimeout = setTimeout(function () {
                    showRefPreview($ref, e);
                }, 350);
            });

            // 离开隐藏预览
            $(document).on('mouseleave', '.law-ref', function () {
                clearTimeout(previewTimeout);
                // 延迟隐藏，允许鼠标移入预览窗口
                hideTimeout = setTimeout(function () {
                    hideRefPreview();
                }, 300);
            });

            // 点击在新标签页中打开
            $(document).on('click', '.law-ref', function (e) {
                e.preventDefault();
                e.stopPropagation();

                var lawId = $(this).data('law-id');
                var article = $(this).data('article');
                var inlineNav = $(this).hasClass('ai-law-ref') || $(this).closest('#aiSidebar').length > 0;

                if (inlineNav && typeof window.navigateToLawArticle === 'function') {
                    window.navigateToLawArticle(lawId, article);
                    return;
                }

                // 新标签页打开（不传尺寸参数，确保是标签页而非弹窗）
                var url = 'annotation.html?law=' + lawId + '&article=' + encodeURIComponent(article);
                window.open(url, '_blank');
            });
        }

        // 显示预览弹窗
        function showRefPreview($ref, e) {
            var lawId = $ref.data('law-id');
            var lawName = $ref.data('law-name');
            var article = $ref.data('article');
            var fullRef = $ref.data('full');

            // 创建预览弹窗（先显示加载中）
            hideRefPreview();
            currentPreview = $('<div class="law-ref-preview">' +
                '<div class="law-ref-preview-title">' + fullRef + '</div>' +
                '<div class="law-ref-preview-content law-ref-preview-loading">加载中...</div>' +
                '</div>').appendTo('body');

            // 鼠标移入预览窗口时保持显示
            currentPreview.on('mouseenter', function () {
                clearTimeout(hideTimeout);
            });

            // 鼠标移出预览窗口时延迟隐藏
            currentPreview.on('mouseleave', function () {
                hideTimeout = setTimeout(function () {
                    hideRefPreview();
                }, 300);
            });

            // 定位弹窗
            positionPreview(currentPreview, e);

            // 获取法条内容
            getRefArticleContent(lawId, article, function (content) {
                if (!currentPreview) return;
                var $content = currentPreview.find('.law-ref-preview-content');
                $content.removeClass('law-ref-preview-loading');

                if (content) {
                    $content.html(content);
                } else {
                    $content.addClass('law-ref-preview-error').text('未找到该法条内容');
                }

                // 加载标注文件，尝试追加标注到标题
                $.ajax({
                    url: 'data/annotations/' + lawId + '.json?_=' + new Date().getTime(),
                    dataType: 'json',
                    cache: false,
                    success: function (data) {
                        if (!currentPreview) return;
                        // 兼容两种格式：嵌套 {annotations: {...}} 和平铺 {"第X条": "..."}
                        var annMap = data.annotations || data;
                        var ann = annMap[article];
                        if (ann) {
                            var $title = currentPreview.find('.law-ref-preview-title');
                            $title.append(' 【' + ann + '】');
                        }
                        positionPreview(currentPreview, e);
                    },
                    error: function () {
                        // 没有标注文件，忽略
                        if (currentPreview) positionPreview(currentPreview, e);
                    }
                });
            });
        }

        // 定位预览弹窗
        function positionPreview($preview, e) {
            if (!$preview || !$preview.length) return;

            var x = e.clientX + 15;
            var y = e.clientY + 15;

            // 先临时显示以获取尺寸
            $preview.css({ left: 0, top: 0, visibility: 'hidden' });
            var rect = { width: $preview.outerWidth(), height: $preview.outerHeight() };
            $preview.css({ visibility: 'visible' });

            // 边界检测
            if (x + rect.width > window.innerWidth - 20) {
                x = e.clientX - rect.width - 15;
            }
            if (y + rect.height > window.innerHeight - 20) {
                y = e.clientY - rect.height - 15;
            }

            x = Math.max(10, x);
            y = Math.max(10, y);

            $preview.css({ left: x, top: y });
        }


        // 隐藏预览弹窗
        function hideRefPreview() {
            clearTimeout(hideTimeout); // 确保清除所有延时
            if (currentPreview) {
                currentPreview.remove();
                currentPreview = null;
            }
        }

        // 获取被引用法条的内容
        function getRefArticleContent(lawId, articleNum, callback) {
            var cacheKey = lawId + '_' + articleNum;

            // 检查缓存
            if (refContentCache[cacheKey]) {
                callback(refContentCache[cacheKey]);
                return;
            }

            // 加载法律JSON
            var lawUrl = 'data/laws_annotation/' + lawId + '.json';

            $.ajax({
                url: lawUrl + '?_=' + new Date().getTime(),
                dataType: 'json',
                cache: false,
                success: function (data) {
                    var content = findArticleInData(data, articleNum);
                    if (content) {
                        refContentCache[cacheKey] = content;
                    }
                    callback(content);
                },
                error: function () {
                    // 尝试基础版路径
                    $.ajax({
                        url: 'data/laws/' + lawId + '.json?_=' + new Date().getTime(),
                        dataType: 'json',
                        cache: false,
                        success: function (data) {
                            var content = findArticleInData(data, articleNum);
                            if (content) {
                                refContentCache[cacheKey] = content;
                            }
                            callback(content);
                        },
                        error: function () {
                            callback(null);
                        }
                    });
                }
            });
        }

        // 在法律数据中查找指定法条
        // 获取法律全文（用于无条文结构的法律，如短篇司法解释）
        function getAllLawContent(data, sourceLawName) {
            var contentArray = [];
            if (data && data.content && Array.isArray(data.content)) {
                contentArray = data.content;
            } else if (Array.isArray(data)) {
                contentArray = data;
            } else if (data && data.data && Array.isArray(data.data)) {
                contentArray = data.data;
            }
            var texts = [];
            for (var i = 0; i < contentArray.length; i++) {
                var t = contentArray[i].lawWebContent || contentArray[i].content || '';
                if (t) texts.push(t);
            }
            if (texts.length === 0) return null;
            var combined = texts.join('\n');
            var paras = combined.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
            // 跳过头部标题类段落：法律名称、通过日期、无句号短行
            var start = 0;
            while (start < paras.length) {
                var p = paras[start];
                var isTitle = (sourceLawName && p === sourceLawName) ||
                    /^（\d{4}年/.test(p) ||
                    (/^（/.test(p) && /通过）$/.test(p)) ||
                    (p.length < 60 && !/[。！？；]/.test(p));
                if (isTitle) { start++; } else { break; }
            }
            return paras.slice(start).map(function (l) {
                return '<div style="margin-bottom:5px;">' + l.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
            }).join('');
        }

        function findArticleInData(data, articleNum) {
            if (!data) return null;

            // 规范化条号用于匹配
            var normalizedNum = normalizeArticleNum(articleNum);
            var arabicMatch = normalizedNum.match(/第(\d+)条(之(\d+))?/);

            // 构建匹配正则（精确匹配法条号开头，排除"第X条第N款"这种引用）
            var searchPatterns = [
                // 精确匹配原始中文条号（如"第二百二十条"），需在行首或段首
                new RegExp('(?:^|[\\r\\n]+)[\\s\\u3000]*' + articleNum + '(?:【|　|\\s|[^之一二三四五六七八九十百千第])'),
                // 阿拉伯数字格式（如果能转换的话，如"第220条"）
                arabicMatch ? new RegExp('(?:^|[\\r\\n]+)[\\s\\u3000]*第' + arabicMatch[1] + '条' + (arabicMatch[3] ? '之' + arabicMatch[3] : '') + '(?:【|　|\\s|[^之一二三四五六七八九十百千第])') : null
            ].filter(Boolean);

            var contentArray = [];

            // 提取内容数组
            if (data.content && Array.isArray(data.content)) {
                contentArray = data.content;
            } else if (Array.isArray(data)) {
                contentArray = data;
            } else if (data.data && Array.isArray(data.data)) {
                contentArray = data.data;
            }

            // 遍历所有内容块查找
            for (var i = 0; i < contentArray.length; i++) {
                var item = contentArray[i];
                var text = item.lawWebContent || item.content || '';

                for (var j = 0; j < searchPatterns.length; j++) {
                    var match = text.match(searchPatterns[j]);
                    if (match) {
                        var startIdx = text.indexOf(match[0]);
                        // 从匹配位置开始提取内容
                        var excerpt = text.substring(startIdx);

                        // 截取到下一个法条之前（排除"条之X"的情况）
                        // 2024-05-21 Fix: 使用逐行扫描策略替代正则，彻底解决复杂文本环境下的截断问题
                        var lines = excerpt.split(/(\r\n|\n|\r)/); // 保留分隔符以便计算索引
                        var currentIdx = 0;
                        var cutIdx = -1;
                        var potentialTitleIdx = -1; // 记录潜在的标题起始位置
                        var foundFirstArticle = false; // 标记是否已经跳过了当前法条的标题

                        for (var k = 0; k < lines.length; k++) {
                            var line = lines[k];
                            // 即使是第一行，也需要累加长度，不能直接continue跳过判断逻辑
                            // 因为excerpt可能以换行符开头，第一行是空的，第二行才是法条标题

                            var trimmed = line.trim();

                            // 检查是否是【小标题】
                            if (/^【[^】]+】$/.test(trimmed)) {
                                potentialTitleIdx = currentIdx; // 记录这个位置可能是下一条的开始
                            }
                            // 检查是否是“第X条”或“第X条之X”
                            else if (/^第[一二三四五六七八九十百千零〇○]+条/.test(trimmed)) {
                                if (!foundFirstArticle) {
                                    // 第一次遇到“第X条”，这是当前法条的标题，忽略它
                                    foundFirstArticle = true;
                                    potentialTitleIdx = -1; // 当前法条的标题前的“小标题”属于当前法条，不应作为截断点
                                } else {
                                    // 第二次遇到“第X条”，这才是下一条，执行截断！
                                    // 如果紧挨着上面有标题，就从标题处截断；否则从这里截断
                                    if (potentialTitleIdx !== -1) {
                                        cutIdx = potentialTitleIdx;
                                    } else {
                                        cutIdx = currentIdx;
                                    }
                                    break;
                                }
                            } else {
                                // 是普通正文，如果不是空行，则重置标题候选
                                if (trimmed.length > 0) {
                                    potentialTitleIdx = -1;
                                }
                            }

                            currentIdx += line.length;
                        }

                        if (cutIdx !== -1) {
                            excerpt = excerpt.substring(0, cutIdx);
                        } else if (excerpt.length > 500) {
                            excerpt = excerpt.substring(0, 500) + '...';
                        }

                        return excerpt.trim().replace(/[\r\n]+[\u3000\s]*/g, '\n').replace(/\n/g, '<br>');
                    }
                }
            }

            // 如果data.content是字符串，直接在其中搜索
            if (data.content && typeof data.content === 'string') {
                for (var k = 0; k < searchPatterns.length; k++) {
                    var strMatch = data.content.match(searchPatterns[k]);
                    if (strMatch) {
                        var strStartIdx = data.content.indexOf(strMatch[0]);
                        var strExcerpt = data.content.substring(strStartIdx);

                        // 2024-05-21 Fix: 使用逐行扫描策略替代正则，彻底解决复杂文本环境下的截断问题
                        var lines = strExcerpt.split(/(\r\n|\n|\r)/); // 保留分隔符以便计算索引
                        var currentIdx = 0;
                        var cutIdx = -1;
                        var potentialTitleIdx = -1; // 记录潜在的标题起始位置
                        var foundFirstArticle = false; // 标记是否已经跳过了当前法条的标题

                        for (var k = 0; k < lines.length; k++) {
                            var line = lines[k];
                            // 即使是第一行，也需要累加长度，不能直接continue跳过判断逻辑

                            var trimmed = line.trim();

                            // 检查是否是【小标题】
                            if (/^【[^】]+】$/.test(trimmed)) {
                                potentialTitleIdx = currentIdx; // 记录这个位置可能是下一条的开始
                            }
                            // 检查是否是“第X条”或“第X条之X”
                            else if (/^第[一二三四五六七八九十百千零〇○]+条/.test(trimmed)) {
                                if (!foundFirstArticle) {
                                    // 第一次遇到“第X条”，这是当前法条的标题，忽略它
                                    foundFirstArticle = true;
                                    potentialTitleIdx = -1;
                                } else {
                                    // 第二次遇到“第X条”，这才是下一条，执行截断！
                                    if (potentialTitleIdx !== -1) {
                                        cutIdx = potentialTitleIdx;
                                    } else {
                                        cutIdx = currentIdx;
                                    }
                                    break;
                                }
                            } else {
                                // 是普通正文，如果不是空行，则重置标题候选
                                if (trimmed.length > 0) {
                                    potentialTitleIdx = -1;
                                }
                            }

                            currentIdx += line.length;
                        }

                        if (cutIdx !== -1) {
                            strExcerpt = strExcerpt.substring(0, cutIdx);
                        } else if (strExcerpt.length > 500) {
                            strExcerpt = strExcerpt.substring(0, 500) + '...';
                        }

                        return strExcerpt.trim().replace(/[\r\n]+[\u3000\s]*/g, '\n').replace(/\n/g, '<br>');
                    }
                }
            }

            return null;
        }

        function navigateToLawArticle(lawId, article) {
            if (!lawId) {
                return;
            }

            if (!treeObj) {
                setTimeout(function () {
                    navigateToLawArticle(lawId, article);
                }, 500);
                return;
            }

            // 在左侧树中定位到该法律
            var node = treeObj.getNodesByFilter(function (n) {
                return String(n.id) === String(lawId);
            }, true);

            if (node) {
                // 展开父节点
                var parent = node.getParentNode();
                while (parent) {
                    treeObj.expandNode(parent, true, false, false);
                    parent = parent.getParentNode();
                }

                // 选中节点
                treeObj.selectNode(node);

                // 直接加载该法律的内容（跳过 loadNodeContent 的递归展开逻辑）
                var targetLawId = lawId;
                var lawTitle = node.content || '';
                if (lawTitle) {
                    $('#contentTitle').text(lawTitle.replace(/（大纲没有）/g, '(大纲没有)'));
                }
                currentLawId = targetLawId;
                var localUrl = DATA_PATH + targetLawId + '.json';
                var url = new URL(window.location.href);
                url.searchParams.set('law', targetLawId);
                if (article) {
                    url.searchParams.set('article', article);
                } else {
                    url.searchParams.delete('article');
                }
                history.replaceState({}, '', url.toString());

                loadAnnotation(targetLawId, function () {
                    $.ajax({
                        url: localUrl + '?_=' + new Date().getTime(),
                        dataType: 'json',
                        cache: false,
                        success: function (data) {
                            lawContentCache[localUrl] = data;
                            displayContent(data, null, lawTitle);

                            // 内容加载完成后，滚动到指定法条
                            if (article) {
                                setTimeout(function () {
                                    scrollToRefArticle(article);
                                }, 400);
                            }
                        },
                        error: function () {
                            $('#tabs').html('<div class="default-content">暂无内容</div>');
                        }
                    });
                });
            }
        }

        // 滚动到指定法条
        function scrollToRefArticle(articleNum) {
            console.log('[法条定位] 开始查找:', articleNum);

            var tabs = $('#tabs');
            var normalizedNum = normalizeArticleNum(articleNum);

            console.log('[法条定位] 规范化后:', normalizedNum);

            var found = false;

            // 直接在所有文本中搜索，找到包含该法条号的元素
            tabs.find('.law-article-title, .law-article').each(function () {
                if (found) return false;

                var $el = $(this);
                // 去除可能的前导星标和多余空格，以便 indexOf 从真正的文本开始匹配
                var text = $el.text().replace(/^[★\s]+/, '');

                // 检查是否包含该法条号（支持多种格式）
                // 如 "第二百二十九条" 或 "第229条" 后跟【或空格或中文
                if (text.indexOf(articleNum) === 0 ||
                    text.indexOf(normalizedNum) === 0 ||
                    text.match(new RegExp('^' + articleNum.replace(/([一二三四五六七八九十百零]+)/g, '$1') + '(?:【|\\s|　|[^之])'))) {

                    console.log('[法条定位] 找到匹配元素:', text.substring(0, 50));
                    found = true;

                    // 滚动到该元素
                    var offset = $el.offset().top - tabs.offset().top + tabs.scrollTop() - 100;
                    tabs.animate({ scrollTop: offset }, 400);

                    // 高亮效果
                    $el.css({
                        'background-color': 'rgba(201, 168, 108, 0.4)',
                        'border-left': '4px solid #c9a86c'
                    });

                    // 同步到法条目录（提取纯条文号用于匹配目录）
                    var tocMatchText = articleNum;
                    if (text.indexOf(normalizedNum) === 0) {
                        tocMatchText = normalizedNum;
                    }
                    syncTocToContent(tocMatchText);

                    setTimeout(function () {
                        $el.css({
                            'background-color': '',
                            'border-left': ''
                        });
                    }, 4000);

                    return false;
                }
            });

            if (!found) {
                // 尝试将阿拉伯数字转为中文数字进行匹配 (例如 URL 参数是 article=189)
                var digitMatch = articleNum.match(/^(\d+)$/);
                if (digitMatch) {
                    var chnNum = numberToChinese(parseInt(digitMatch[1]));
                    var searchNum = '第' + chnNum + '条';
                    console.log('[法条定位] 尝试数字转换匹配:', searchNum);

                    tabs.find('.law-article-title, .law-article').each(function () {
                        if (found) return false;
                        var text = $(this).text().replace(/^[★\s]+/, '');
                        if (text.indexOf(searchNum) === 0) {
                            console.log('[法条定位] 转换匹配找到:', text.substring(0, 50));
                            found = true;
                            var $el = $(this);
                            var offset = $el.offset().top - tabs.offset().top + tabs.scrollTop() - 100;
                            tabs.animate({ scrollTop: offset }, 400);
                            $el.css({ 'background-color': 'rgba(201, 168, 108, 0.4)', 'border-left': '4px solid #c9a86c' });

                            // 同步到法条目录
                            syncTocToContent(searchNum);

                            setTimeout(function () { $el.css({ 'background-color': '', 'border-left': '' }); }, 4000);
                            return false;
                        }
                    });
                }
            }

            if (!found) {
                console.log('[法条定位] 最终未找到法条:', articleNum);
            }
        }

        function getFavStorageKey() {
            return 'law_favorites_' + (currentUser ? currentUser : 'guest');
        }

        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem(getFavStorageKey())) || {};
            } catch (e) {
                return {};
            }
        }

        function saveFavorites(favs) {
            localStorage.setItem(getFavStorageKey(), JSON.stringify(favs));
        }

        function isFavorited(lawId, articleNum) {
            var favs = getFavorites();
            for (var cat in favs) {
                for (var lawName in favs[cat]) {
                    if (String(favs[cat][lawName].lawId) === String(lawId) && favs[cat][lawName].articles[articleNum]) {
                        return true;
                    }
                }
            }
            return false;
        }

        function getLawCategory(lawId) {
            if (!treeObj) return '未分类';
            var node = treeObj.getNodesByFilter(function (n) {
                return String(n.id) === String(lawId);
            }, true);
            if (!node) return '未分类';
            // 向上找到顶级分类节点
            var root = node;
            while (root.getParentNode()) {
                root = root.getParentNode();
            }
            return root.content || '未分类';
        }

        function getLawName(lawId) {
            var title = $('#contentTitle').text().replace(/（大纲没有）/g, '').replace(/\(大纲没有\)/g, '').trim();
            if (title && title !== '法律法规汇编 - 标注版') return title;
            // fallback: 从树节点中获取
            if (!treeObj) return '未知法律';
            var node = treeObj.getNodesByFilter(function (n) {
                return String(n.id) === String(lawId);
            }, true);
            return node ? (node.content || '未知法律') : '未知法律';
        }

        function toggleFavorite(starEl) {
            var $star = $(starEl);
            var lawId = $star.data('law-id');
            var articleNum = $star.data('article');
            var annotation = $star.data('annotation') || '';
            var category = getLawCategory(lawId);
            var lawName = getLawName(lawId);

            var favs = getFavorites();

            if ($star.hasClass('favorited')) {
                // 取消收藏
                $star.removeClass('favorited');
                if (favs[category] && favs[category][lawName] && favs[category][lawName].articles) {
                    delete favs[category][lawName].articles[articleNum];
                    // 清理空节点
                    if (Object.keys(favs[category][lawName].articles).length === 0) {
                        delete favs[category][lawName];
                    }
                    if (Object.keys(favs[category]).length === 0) {
                        delete favs[category];
                    }
                }
            } else {
                // 添加收藏
                $star.addClass('favorited');
                if (!favs[category]) favs[category] = {};
                if (!favs[category][lawName]) {
                    favs[category][lawName] = { lawId: String(lawId), articles: {} };
                }
                favs[category][lawName].articles[articleNum] = annotation;
            }

            saveFavorites(favs);

            // 如果收藏夹面板正在显示，刷新面板
            if ($('#favPanel').hasClass('show')) {
                renderFavPanel();
            }
        }

                success: function (res) {
                    if (res.code === 200) {
                        $('#authMsg').text('✅ 注册成功，请重新登录').css('color', '#27ae60');
                        setTimeout(function () { switchAuthTab('login'); }, 1500);
                    } else {
                        $('#authMsg').text(res.msg || '✖ 注册失败').css('color', '#e74c3c');
                    }
                },
                error: function () {
                    $('#authMsg').text('✖ 连接服务器失败，请确保本地后台已启动 (' + LOCAL_BACKEND_HINT + ')').css('color', '#e74c3c');
                }
            });
        }

        function submitLogin() {
            var username = $('#loginUsername').val().trim();
            var password = $('#loginPassword').val().trim();

            if (!username || !password) {
                $('#authMsg').text('用户名和密码不能为空');
                return;
            }

            $('#authMsg').text('验证中...').css('color', '#666');
            $.ajax({
                url: BASE_URL + '/login',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ username: username, password: password }),
                success: function (res) {
                    if (res.code === 200) {
                        $('#authMsg').text('✅ 登录成功！').css('color', '#27ae60');
                        localStorage.setItem('law_token', res.token);
                        localStorage.setItem('law_username', username);
                        localStorage.setItem('law_activated', res.activated ? 'true' : 'false');
                        updateLoginStatus();
                        refreshActivationBadge(res.activated);

                        // 登录成功后重新加载当前法条（应用该账号的星星）
                        if (typeof loadLawContent === 'function' && window.currentLawId) {
                            loadLawContent(window.currentLawId);
                        }
                        if ($('#favPanel').hasClass('show')) {
                            renderFavPanel();
                        }

                        setTimeout(function () {
                            $('#authOverlay').css('display', 'none'); // 直接关闭
                        }, 1000);
                    } else {
                        $('#authMsg').text(res.msg || '✖ 账号或密码错误').css('color', '#e74c3c');
                    }
                },
                error: function () {
                    $('#authMsg').text('✖ 连接服务器失败，请确保本地后台已启动 (' + LOCAL_BACKEND_HINT + ')').css('color', '#e74c3c');
                }
            });
        }
    </script>
    <script src="js/ai_sidebar.js?v=8"></script>
</body>

</html>
